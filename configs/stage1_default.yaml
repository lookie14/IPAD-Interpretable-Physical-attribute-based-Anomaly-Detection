# =============================================================================
# Stage 1 — Aligned multi-layer position-wise anomaly localization (DINOv3)
#   - ref 정상 이미지들을 canonical pose 로 정렬
#   - test 이미지도 같은 pose 로 derotate/center
#   - 같은 grid 위치끼리만 비교(position-wise)
#   - 여러 DINOv3 layer 의 score map 평균
# =============================================================================

data_root: "./data/mvtec_anomaly_detection"
category: "grid"
output_dir: "./outputs/stage1"
run_name: "default"

# Optional test-set filtering (null = use everything).
#   test_anomaly_types: ["bent", "broken", "good"]   # keep only these test subfolders
#   test_indices: [0, 1]                              # keep only 000.png, 001.png
test_anomaly_types: null
test_indices: [0, 1, 2, 3, 4]

normal_shots: 4          # reference normal image 장수 (N_ref)
# reference 를 직접 지정: 파일 숫자 stem 리스트 (예: [0,1,2,3] -> 000~003.png).
# null 이면 seed 로 고정된 무작위 normal_shots 장을 사용.
reference_indices: null
image_size: 224           # patch(16)의 배수로 자동 보정됨
batch_size: 1
num_workers: 4
device: "cuda"            # 불가 시 cuda -> mps -> cpu 자동 폴백
seed: 42

# 회전 정렬: test 이미지를 정상 reference pose 로 de-rotate 후 feature 추출.
# (reference 는 정준 pose 라 회전 안 함. 회전각만 추정해 원본 RGB에 적용 → 색 보존)
rotation:
  enabled: true
  # 이 목록에 든 카테고리에서만 회전 정렬 on. 비우면 enabled 값을 전 카테고리에 동일 적용.
  enabled_categories: []
  size: 256                # 각도 추정 해상도
  method: "direct"         # "fourier" (translation 강인) | "direct"
  refine: true              # 미세 각도 refinement
  background: "edge"        # 회전 모서리 채우기: "edge" | 상수값(0~1)
  min_score: 0.0            # 정렬 score 가 이 값 미만이면 원본 유지(정렬 불신뢰 시)
  ref_align_iters: 2        # reference 상호 정렬 반복 횟수(템플릿 재추정). 1이면 부트스트랩만
  center: true               # 회전 전 물체 위치를 중앙으로 보정 (위치변동 + direct 조합 권장)
  center_tol: 0.12          # centering 전경 판정 임계값 (배경과 이 이상 차이나면 전경)
  matte: false               # true 면 회전 전 rembg 로 누끼(전경 분리) 후 배경을 단색으로 대체
  matte_fill: "auto"        # 누끼 배경 채움색: "auto" | "white" | "black" | 상수 | (r,g,b)
  matte_model: "u2net"      # rembg 모델

backbone:
  name: "dinov3_vitb16"           # torch.hub entrypoint / dummy 시 무시
  source: "meta_local"            # "meta_local" | "dummy"
  # ---- source == "meta_local" 일 때만 필요 ----
  #   1) facebookresearch/dinov3 repo 를 아래 경로에 clone (hubconf.py 위치)
  #   2) Meta 원본 .pth 가중치를 weights_path 에 배치
  repo_dir: "./third_party/dinov3"
  weights_path: "./weights/dinov3/dinov3_vitb16_pretrain_lvd1689m-73cec8be.pth"
  # --------------------------------------------
  feature_type: "patch_token"     # class token 은 사용하지 않음
  # 여러 layer 를 동시에 뽑아 평균 (project3: multi-layer). 단일 레이어면 리스트 길이 1.
  layer_indices: [3, 6, 9, 11]     # 여러 block 평균 (project3: multi-layer)
  freeze: true
  normalize_feature: true         # cosine distance 위해 patch feature L2 normalize

scoring:
  comparison: "position_wise"     # 같은 grid 위치끼리만 비교
  distance_metric: "cosine"       # "cosine" | "l2"
  k: 1                            # 같은 위치 ref 중 최근접 k개 평균. 1=min distance
  neighborhood: 0                 # fuse.enabled=false 일 때만 사용 (0=1x1, 1=3x3, 2=5x5)
  # 여러 neighborhood 의 score map 을 가중평균으로 융합 (켜지면 위 neighborhood 무시).
  fuse:
    enabled: true
    neighborhoods: [0, 1]         # 융합할 neighborhood 목록 (예: 단일 patch + 3x3)
    weights: [0.5, 0.5]           # 각 map 가중치 (내부에서 합=1 로 정규화)
    normalize: "none"             # 융합 전 각 map 정규화: "none" | "minmax" | "zscore"

candidate:
  method: "threshold"             # "topk" | "threshold"
  topk_ratio: 0.1                 # (topk) 비율 방식 (전체 patch 수 * ratio)
  topk_k: null                    # (topk) 절대 개수. 정수면 topk_ratio 무시 (예: 10)
  score_threshold: 0.3            # per-category 에 없는 카테고리의 전역 기본값
  # 카테고리별 threshold override. 비워두면 위 score_threshold 사용.
  # score_threshold_per_category:
  #   hazelnut: 0.25
  #   screw: 0.12
  save_feature: true              # candidate feature 를 .pt 에 저장

visualization:
  save_heatmap: true
  save_overlay: true
  save_score_map_npy: true
  save_candidate_boxes: true
  save_candidate_panel: true      # 원본 | candidate box | overlay 3-panel
  save_comparison: true           # 원본 | ground truth | overlay 3-panel
  save_aligned_refs: true
  overlay_alpha: 0.5
